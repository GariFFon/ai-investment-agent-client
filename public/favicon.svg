<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle with dark gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bullGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />

  <!-- Candlestick 1 (bearish - red) -->
  <!-- Wick top -->
  <line x1="15" y1="12" x2="15" y2="18" stroke="url(#bearGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="11" y="18" width="8" height="13" rx="1.5" fill="url(#bearGrad)" />
  <!-- Wick bottom -->
  <line x1="15" y1="31" x2="15" y2="37" stroke="url(#bearGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 2 (bullish - green) -->
  <!-- Wick top -->
  <line x1="32" y1="10" x2="32" y2="17" stroke="url(#bullGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="28" y="17" width="8" height="18" rx="1.5" fill="url(#bullGrad)" />
  <!-- Wick bottom -->
  <line x1="32" y1="35" x2="32" y2="42" stroke="url(#bullGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Candlestick 3 (bearish - red) -->
  <!-- Wick top -->
  <line x1="49" y1="15" x2="49" y2="22" stroke="url(#bearGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="45" y="22" width="8" height="11" rx="1.5" fill="url(#bearGrad)" />
  <!-- Wick bottom -->
  <line x1="49" y1="33" x2="49" y2="39" stroke="url(#bearGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Trend line (upward, subtle) -->
  <polyline points="10,50 22,46 36,44 54,40" fill="none" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="3,2" opacity="0.7"/>

  <!-- Bottom label dots -->
  <circle cx="15" cy="54" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="32" cy="54" r="2" fill="#818cf8" opacity="0.5"/>
  <circle cx="49" cy="54" r="2" fill="#818cf8" opacity="0.5"/>
</svg>